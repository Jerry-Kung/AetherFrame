# 姿势族活字典 v1（2026-07-16 设计文档 §6）。单层枚举，LLM 姿势打标的合法输出集。
# 演化规则与崩坏 taxonomy 一致：只增不改；新族经用户确认后 bump version；
# 合并/改名时把旧族写入 aliases 映射，历史标签永不回改，分析时按 aliases 归一。
# 粒度取舍：~8 族 + 兜底——更细稀释小样本，更粗丢因果分辨力。
version: v1
families:
  sit_normal: 常规坐姿（椅子/沙发/台阶/地面端坐，双腿自然下垂或平放）
  sit_crosslegged: 盘腿坐（含双脚脚掌相对）
  sit_kneel: 跪坐或半蹲（膝盖着地的正坐/跪坐，或屈膝下蹲）
  lie_side: 侧卧
  lie_prone: 趴卧/俯卧（含趴卧双腿后翘）
  lie_supine: 仰卧/后仰躺
  recline_lean: 慵懒斜靠（贵妃榻/沙发扶手/床脚，半躺半坐的倚靠）
  stand: 站姿（含踮脚、倚墙站立）
  other: 无法归入以上任何族（兜底，触发人工复核并提议新族）
aliases: {}
