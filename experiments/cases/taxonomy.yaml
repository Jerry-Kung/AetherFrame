# 崩坏分类活字典（设计文档 §2.2）。tags 为两层：父类 -> 子类列表。
# 演化规则：新增子 tag 需 bump version；合并/重挂父时把旧 tag 写入 aliases 映射，
# 历史 Case 的 tags 与 taxonomy_version 永不回改，聚合分析时按 aliases 归一。
# v2（2026-07-08，exp002 揭盲后用户确认）：新增 脚部/脚尖变色、袜子/穿鞋、画风/3D玩偶感。
version: v2
tags:
  脚部: [简陋, 夸张, 比例结构, 脚尖变色]
  腿部: [结构错误]
  袜子: [上色感, 塑料袋感, 皱褶夸张, 缺失, 穿鞋]
  画风: [写实化, 平面2D, 3D玩偶感]
  身体比例: [整体不协调]
  其他: [未分类]
aliases: {}
